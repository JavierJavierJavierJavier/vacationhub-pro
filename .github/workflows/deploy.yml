name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'server/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'vite.config.js'
      - 'tailwind.config.js'
      - 'index.html'

env:
  AWS_REGION: eu-west-1
  ECR_REPO: vacationhub-prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          IMAGE_URI=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}
          docker build -t $IMAGE_URI:latest -t $IMAGE_URI:${{ github.sha }} .
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Smoke test - container starts and listens
        run: |
          docker run -d --name smoke-test -p 8080:8080 \
            -e PORT=8080 -e NODE_ENV=test \
            -e JWT_SECRET=test-secret \
            ${{ env.IMAGE_URI }}:latest
          echo "Waiting for container to start..."
          sleep 5
          if ! docker ps --filter "name=smoke-test" --filter "status=running" -q | grep -q .; then
            echo "Container failed to start. Logs:"
            docker logs smoke-test
            exit 1
          fi
          echo "Container is running successfully"
          docker stop smoke-test && docker rm smoke-test

      - name: Push Docker image to ECR
        run: |
          docker push ${{ env.IMAGE_URI }}:latest
          docker push ${{ env.IMAGE_URI }}:${{ github.sha }}
